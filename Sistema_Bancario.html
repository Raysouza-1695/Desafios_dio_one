<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema Bancário</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: white;
      transition: 0.3s;
    }
    .btn i {
      margin-right: 8px;
    }
    .depositar { background-color: #27ae60; }
    .depositar:hover { background-color: #1e8449; }
    .sacar { background-color: #e74c3c; }
    .sacar:hover { background-color: #c0392b; }
    .extrato { background-color: #3498db; }
    .extrato:hover { background-color: #2980b9; }
    .sair { background-color: #7f8c8d; }
    .sair:hover { background-color: #616a6b; }
    #extrato {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9f9;
      border-radius: 8px;
      min-height: 60px;
      font-size: 14px;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💳 Sistema Bancário</h1>
    
    <label>Valor:</label>
    <input type="number" id="valor" placeholder="Digite o valor" step="0.01">
    
    <button class="btn depositar" onclick="depositar()"><i class="fa-solid fa-money-bill-wave"></i> Depositar</button>
    <button class="btn sacar" onclick="sacar()"><i class="fa-solid fa-hand-holding-dollar"></i> Sacar</button>
    <button class="btn extrato" onclick="mostrarExtrato()"><i class="fa-solid fa-file-invoice-dollar"></i> Extrato</button>
    <button class="btn sair" onclick="sair()"><i class="fa-solid fa-door-open"></i> Sair</button>
    
    <div id="extrato"></div>
  </div>

  <script>
    let saldo = 0;
    let limite = 500;
    let extrato = "";
    let numeroSaques = 0;
    const LIMITE_SAQUES = 3;

    function limparCampo() {
      document.getElementById("valor").value = "";
    }

    function depositar() {
      let valor = parseFloat(document.getElementById("valor").value);
      if (valor > 0) {
        saldo += valor;
        extrato += `✅ Depósito: R$ ${valor.toFixed(2)}<br>`;
        alert("Depósito realizado com sucesso!");
      } else {
        alert("Valor inválido!");
      }
      limparCampo(); // limpa após operação
    }

    function sacar() {
      let valor = parseFloat(document.getElementById("valor").value);
      if (valor > saldo) {
        alert("❌ Saldo insuficiente!");
      } else if (valor > limite) {
        alert("❌ O valor excede o limite!");
      } else if (numeroSaques >= LIMITE_SAQUES) {
        alert("❌ Número máximo de saques excedido!");
      } else if (valor > 0) {
        saldo -= valor;
        extrato += `⚠️ Saque: R$ ${valor.toFixed(2)}<br>`;
        numeroSaques++;
        alert("Saque realizado com sucesso!");
      } else {
        alert("Valor inválido!");
      }
      limparCampo(); // limpa após operação
    }

    function mostrarExtrato() {
      document.getElementById("extrato").innerHTML = extrato + `<br><strong>💰 Saldo: R$ ${saldo.toFixed(2)}</strong>`;
      limparCampo(); // limpa após operação
    }

    function sair() {
      alert("Obrigado por utilizar o sistema!");
      window.close();
    }
  </script>
</body>
</html>
